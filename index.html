<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>モタスポ沼ナビ</title>
  <meta name="description" content="F1からWRC、WEC、SUPER GTなどへ。順位の理由とレースの物語を、観戦前に静かに読める初心者向けガイド。" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Motorsport Story Guide</p>
        <h1>モタスポ沼ナビ</h1>
        <p class="lead">F1は好き。でもWRC、WEC、SUPER GT、NASCARは何から見ればいいか分からない。そんな人のための“物語で入る”観戦ガイド。</p>
      </div>
      <div class="heroPanel">
        <div class="heroPanelTitle"><b>観戦前、少しだけ夜更かし。</b><span class="versionBadge">v0.2</span></div>
        <p>速報を追う場所ではありません。次のレースで誰を、何を見ればいいか。物語の地図を静かに広げます。</p>
        <span id="globalUpdated">読み込み中...</span>
      </div>
    </header>

    <nav class="topNav">
      <button class="mode active" data-mode="story">今のストーリー</button>
      <button class="mode" data-mode="deepDive">深掘り</button>
      <button class="mode" data-mode="standings">最新順位メモ</button>
      <button class="mode" data-mode="history">歴史</button>
      <button class="mode" data-mode="people">人物・チーム</button>
      <button class="mode" data-mode="beginner">初心者向け</button>
    </nav>

    <div class="searchBox">
      <input id="searchInput" placeholder="例：ラリー、耐久、日本、電動、オーバル、トヨタ" />
    </div>

    <main class="layout">
      <aside id="categoryList" class="categoryList" aria-label="カテゴリー"></aside>
      <section id="content" class="content" aria-live="polite"></section>
    </main>

    <footer class="footer">
      <p>順位は入口、物語が本編。正確な最新順位と日程は、各ページの公式リンクでご確認ください。</p>
    </footer>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
